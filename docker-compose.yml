services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fnmnl_demo
      POSTGRES_USER: fnmnl
      POSTGRES_PASSWORD: fnmnl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fnmnl -d fnmnl_demo"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgres://fnmnl:fnmnl@postgres:5432/fnmnl_demo
      RACK_ENV: development
      WEB_CONCURRENCY: 2
      RACK_MAX_THREADS: 8
      CORS_ORIGIN: http://localhost:5174
    ports:
      - "4567:4567"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "exit(Net::HTTP.get_response(URI('http://127.0.0.1:4567/healthz')).is_a?(Net::HTTPSuccess) ? 0 : 1)"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    image: node:25-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:4567
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
